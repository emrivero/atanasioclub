<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Catálogo de la biblioteca de Atanasio Club"
    />
    <title>Biblioteca — Atanasio Club</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="app.js" type="module"></script>
  </head>
  <body>
    <header class="hero">
      <h1>Atanasio Club</h1>
      <p class="intro">
        Busca por título o autor y encuentra tu próxima lectura.
      </p>
    </header>

    <main>
      <section class="filters" aria-label="Buscar y filtrar el catálogo">
        <label class="search-field">
          <span class="sr-only">Buscar por título o autor</span>
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path
              d="m21 21-4.35-4.35m2.35-5.65a8 8 0 1 1-16 0 8 8 0 0 1 16 0Z"
            />
          </svg>
          <input
            id="search"
            type="search"
            placeholder="Título o autor…"
            autocomplete="off"
          />
          <kbd>/</kbd>
        </label>

        <label>
          <span>Género</span>
          <select id="genre">
            <option value="">Todos los géneros</option>
          </select>
        </label>

        <label>
          <span>Ordenar</span>
          <select id="sort">
            <option value="title">Título (A–Z)</option>
            <option value="author">Autor (A–Z)</option>
            <option value="genre">Género (A–Z)</option>
          </select>
        </label>
      </section>

      <div class="catalog-heading">
        <p id="results" aria-live="polite">Cargando biblioteca…</p>
        <button id="clear" class="text-button" hidden>Limpiar filtros</button>
      </div>

      <section id="catalog" class="catalog" aria-label="Libros"></section>

      <div id="empty" class="empty" hidden>
        <span>Sin coincidencias</span>
        <p>Prueba con otros términos o elimina algún filtro.</p>
      </div>

      <button id="more" class="more" hidden>Mostrar más</button>
    </main>

    <footer>
      Catálogo personal · <span id="total"></span> libros únicos ·
      <span id="physical-total"></span> ficheros
    </footer>

    <template id="book-template">
      <article class="book">
        <div class="book-mark" aria-hidden="true"></div>
        <div>
          <div class="book-topline">
            <p class="book-genre"></p>
            <div class="book-formats" aria-label="Formatos disponibles"></div>
          </div>
          <h2 class="book-title"></h2>
          <p class="book-author"></p>
        </div>
      </article>
    </template>
  </body>
</html>
